<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consejero de Vestimenta</title>
</head>
<body>

    <h1>Consejero de Vestimenta</h1>

    <form method="POST">
        <label>Temperatura (°C):</label><br>
        <input type="number" name="temperatura" required><br><br>

        <label>¿Llueve? (s/n):</label><br>
        <input type="text" name="llueve" required><br><br>

        <button type="submit">Obtener consejo</button>
    </form>

    {% if consejo %}
        <h2>{{ consejo }}</h2>
    {% endif %}

</body>
</html>
